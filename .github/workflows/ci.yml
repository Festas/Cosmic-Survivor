name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: npm-

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run tests
        run: npm test

      - name: Validate content
        run: npm run validate:content

      - name: Build
        run: npm run build

      - name: Coverage report
        run: |
          echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          node --test --experimental-test-coverage tests/ 2>&1 \
            | grep -E 'coverage|%|all files' \
            | head -40 \
            >> "$GITHUB_STEP_SUMMARY" || true

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: npm-

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run build

      - name: Report bundle size
        id: report
        run: |
          MAIN_SIZE=$(stat -c%s dist/main.js 2>/dev/null || echo 0)
          DIST_SIZE=$(du -sb dist/ 2>/dev/null | cut -f1 || echo 0)

          echo "## Bundle Size" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| dist/main.js | $(numfmt --to=iec-i --suffix=B $MAIN_SIZE) ($MAIN_SIZE bytes) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| dist/ (total) | $(numfmt --to=iec-i --suffix=B $DIST_SIZE) ($DIST_SIZE bytes) |" >> "$GITHUB_STEP_SUMMARY"

          # Compare against origin/main if in a PR context and dist/main.js is tracked there.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_MAIN_SIZE=$(git show origin/main:dist/main.js 2>/dev/null | wc -c || echo 0)
            if [ "$BASE_MAIN_SIZE" -gt 0 ] && [ "$MAIN_SIZE" -gt 0 ]; then
              PCT=$(echo "scale=2; ($MAIN_SIZE - $BASE_MAIN_SIZE) * 100 / $BASE_MAIN_SIZE" | bc)
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "**Change vs base branch:** ${PCT}%" >> "$GITHUB_STEP_SUMMARY"
              THRESHOLD=5
              OVER=$(echo "$PCT > $THRESHOLD" | bc)
              if [ "$OVER" = "1" ]; then
                echo "⚠️ dist/main.js grew more than ${THRESHOLD}% (soft-fail, CI still green)" >> "$GITHUB_STEP_SUMMARY"
              fi
            else
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "_dist/main.js not present on base branch — skipping size comparison._" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_Base branch comparison only runs in PR context._" >> "$GITHUB_STEP_SUMMARY"
          fi
