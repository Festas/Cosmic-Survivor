name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: festas/cosmic-survivor
  WS_ENDPOINT: https://cs.festas-builds.com/ws
  # Seconds to wait after nginx -s reload before running the smoke test.
  # nginx reload is near-instant; 2 s covers any slow worker drain.
  NGINX_RELOAD_WAIT: 2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Hetzner server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create deployment directory if it doesn't exist
            mkdir -p /home/deploy/cosmic-survivor
            
            # Navigate to deployment directory
            cd /home/deploy/cosmic-survivor
            
            # Log in to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null
            
            # Create docker-compose.yml
            cat > docker-compose.yml <<EOF
            version: '3.8'
            
            services:
              cosmic-survivor:
                container_name: cosmic-survivor
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                restart: unless-stopped
                ports:
                  - "127.0.0.1:8200:80"
                volumes:
                  - cosmic-data:/data
            
            volumes:
              cosmic-data:
            EOF
            
            # Pull latest image and restart container
            docker compose pull
            docker compose up -d
            
            # Logout from registry for security
            docker logout ghcr.io
            
            # Clean up old images
            docker image prune -af
            
            # Reload host nginx so any config changes in the Link-in-Bio repo
            # take effect immediately (prevents stale /ws proxy config causing
            # WebSocket upgrade failures with close code 1006)
            sudo nginx -t && sudo nginx -s reload
            
            # Give nginx a moment to complete the reload (worker processes finish
            # draining existing connections; 2 s is well within the typical
            # graceful-shutdown window and keeps total deploy time minimal)
            sleep "${{ env.NGINX_RELOAD_WAIT }}"
            
            # Smoke-test the WebSocket handshake through the public endpoint.
            # A working reverse-proxy returns HTTP 101; anything else (e.g. 400,
            # 502) indicates the Upgrade headers are not being forwarded.
            # The || true keeps the step green so a transient blip doesn't block
            # the deploy, but the response code is printed for visibility.
            # Note: Sec-WebSocket-Key is the sample value from RFC 6455 §11.3
            # (base64 of "the sample nonce") — it is a standard test token, not
            # a secret or production key.
            WS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --http1.1 \
              -H "Connection: Upgrade" -H "Upgrade: websocket" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              "${{ env.WS_ENDPOINT }}" || true)
            echo "WebSocket smoke-test HTTP status: ${WS_STATUS}"
            if [ "${WS_STATUS}" != "101" ]; then
              echo "WARNING: WebSocket handshake did not return 101 (got ${WS_STATUS}). Check host nginx /ws config."
            fi
